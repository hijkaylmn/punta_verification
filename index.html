<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Email Verified Successfully - P.U.N.T.A.</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

body{
font-family:'Inter',sans-serif;
}
</style>

</head>

<body class="min-h-screen bg-gradient-to-br from-green-50 via-white to-emerald-100 flex justify-center items-center p-4">

<div class="max-w-md w-full">

<div class="bg-white rounded-3xl shadow-2xl shadow-green-100 p-8 md:p-10 text-center border border-green-100">

<!-- Success Icon -->
<div class="w-24 h-24 mx-auto mb-6 rounded-full bg-gradient-to-r from-green-500 to-emerald-600 flex justify-center items-center shadow-lg">

<svg class="w-12 h-12 text-white"
fill="none"
stroke="currentColor"
viewBox="0 0 24 24">

<path
stroke-linecap="round"
stroke-linejoin="round"
stroke-width="3"
d="M5 13l4 4L19 7"/>

</svg>

</div>


<!-- Title -->
<h1 class="text-3xl font-bold text-gray-800 mb-3">

Account Verified Successfully 🎉

</h1>


<!-- Description -->
<p class="text-gray-600 leading-relaxed mb-8">

Your <span class="font-semibold text-green-700">P.U.N.T.A.</span>
account has been verified.

You can now start scheduling recyclable pickups,
track collectors in real time, and turn waste into value.

</p>


<!-- Buttons -->
<div class="space-y-4">

<button
id="openAppBtn"
class="w-full py-4 rounded-2xl bg-gradient-to-r from-green-500 to-emerald-600 text-white font-semibold shadow-lg hover:scale-[1.02] transition flex justify-center items-center gap-2">

<svg class="w-5 h-5"
fill="none"
stroke="currentColor"
viewBox="0 0 24 24">

<path
stroke-linecap="round"
stroke-linejoin="round"
stroke-width="2"
d="M13 10V3L4 14h7v7l9-11h-7z"/>

</svg>

Open P.U.N.T.A App

</button>



<button
id="loginBtn"
class="w-full py-4 rounded-2xl border-2 border-gray-200 text-gray-700 font-semibold hover:bg-gray-50 transition flex justify-center items-center gap-2">

<svg class="w-5 h-5"
fill="none"
stroke="currentColor"
viewBox="0 0 24 24">

<path
stroke-linecap="round"
stroke-linejoin="round"
stroke-width="2"
d="M11 16l-4-4m0 0l4-4m-4 4h14"/>

</svg>

Go To Login

</button>

</div>



<!-- Auto Redirect -->
<p
id="autoRedirectMsg"
class="mt-6 text-sm text-gray-400">

Opening P.U.N.T.A in

<span id="countdown">5</span>

seconds...

</p>


</div>


<!-- Footer -->
<p class="text-center mt-6 text-sm text-gray-500">

Need help?

<a href="#"
class="text-green-600 font-semibold hover:text-green-700">

Contact Support

</a>

</p>

</div>




<script>

/*
Update these with your Flutter deep links
*/

const APP_URL =
'punta://home';

const LOGIN_URL =
'punta://login';

const VERIFY_CALLBACK =
'punta://verification-success';


let countdown = 5;



function openDeepLink(urls,fallback){

const start =
Date.now();

const timeout =
1500;


window.location.href =
urls[0];


setTimeout(()=>{

if(Date.now()-start < timeout+100){

if(urls.length > 1){

openDeepLink(
urls.slice(1),
fallback
);

}else{

document.getElementById(
'autoRedirectMsg'
).textContent =
'App not installed. Redirecting...';


setTimeout(()=>{

window.location.href =
fallback;

},1000);

}

}

},timeout);

}




function openApp(){

openDeepLink(

[
VERIFY_CALLBACK,
APP_URL
],

APP_URL

);

}



function openLogin(){

openDeepLink(

[
VERIFY_CALLBACK,
LOGIN_URL
],

LOGIN_URL

);

}




document
.getElementById(
'openAppBtn'
)
.addEventListener(
'click',
openApp
);



document
.getElementById(
'loginBtn'
)
.addEventListener(
'click',
openLogin
);



const countdownEl =
document.getElementById(
'countdown'
);


const interval =
setInterval(()=>{

countdown--;

if(countdown <= 0){

clearInterval(interval);

document.getElementById(
'autoRedirectMsg'
).textContent =
'Opening P.U.N.T.A...';


openApp();

}else{

countdownEl.textContent =
countdown;

}

},1000);



window.addEventListener(
'blur',
()=>clearInterval(interval)
);

</script>


</body>
</html>
