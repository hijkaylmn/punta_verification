<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>P.U.N.T.A - Email Verified</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

body{
font-family:'Inter',sans-serif;
}

</style>

</head>


<body class="min-h-screen bg-gradient-to-br from-green-50 via-white to-emerald-100 flex justify-center items-center p-4">

<div class="max-w-md w-full">

<div class="bg-white rounded-3xl shadow-xl border border-green-100 p-8 text-center">


<!-- Success Icon -->

<div class="w-24 h-24 rounded-full mx-auto bg-gradient-to-r from-green-500 to-emerald-600 flex justify-center items-center shadow-lg mb-6">

<svg class="w-12 h-12 text-white"
fill="none"
stroke="currentColor"
viewBox="0 0 24 24">

<path
stroke-linecap="round"
stroke-linejoin="round"
stroke-width="3"
d="M5 13l4 4L19 7"/>

</svg>

</div>



<!-- Title -->

<h1 class="text-3xl font-bold text-gray-800 mb-3">

Email Verified Successfully 🎉

</h1>



<!-- Description -->

<p class="text-gray-600 leading-relaxed mb-8">

Your email address has been verified.

You completed

<span class="font-semibold text-green-700">

Step 2 of 8

</span>

for your

<span class="font-semibold">

P.U.N.T.A Registration

</span>.

Complete the remaining steps to activate your account.

</p>



<!-- Progress -->

<div class="mb-8">

<div class="flex justify-between text-xs text-gray-500 mb-2">

<span>1</span>
<span>2</span>
<span>3</span>
<span>4</span>
<span>5</span>
<span>6</span>
<span>7</span>
<span>8</span>

</div>


<div class="w-full bg-gray-200 rounded-full h-3">

<div
class="bg-gradient-to-r from-green-500 to-emerald-600 h-3 rounded-full"

style="width:25%;">

</div>

</div>


<p class="mt-2 text-sm text-gray-500">

25% Complete

</p>

</div>




<!-- Main CTA -->

<button

id="continueBtn"

class="w-full py-4 rounded-2xl bg-gradient-to-r from-green-500 to-emerald-600 text-white font-semibold shadow-lg hover:scale-[1.02] transition">

Continue to Step 3

</button>



<!-- Secondary -->

<button

id="laterBtn"

class="w-full py-4 mt-4 rounded-2xl border border-gray-200 text-gray-700 hover:bg-gray-50">

Finish Registration Later

</button>




<p

id="redirectMsg"

class="text-sm text-gray-400 mt-6">

Redirecting to Step 3 in

<span id="countdown">

5

</span>

seconds...

</p>



</div>

</div>




<script>


/*
Update with Flutter routes
*/

const STEP3_ROUTE =
'punta://registration/step3';

const LOGIN_ROUTE =
'punta://login';



function continueRegistration(){

window.location.href =
STEP3_ROUTE;

}



document
.getElementById('continueBtn')
.addEventListener(
'click',
continueRegistration
);



document
.getElementById('laterBtn')
.addEventListener(

'click',

()=>{

window.location.href =
LOGIN_ROUTE;

}

);



let countdown = 5;


const interval =
setInterval(()=>{

countdown--;


document.getElementById(
'countdown'
).textContent =
countdown;


if(countdown <=0){

clearInterval(interval);

document.getElementById(
'redirectMsg'
).textContent =
'Redirecting to Step 3...';


continueRegistration();

}

},1000);



window.addEventListener(
'blur',
()=>clearInterval(interval)
);

</script>


</body>

</html>
